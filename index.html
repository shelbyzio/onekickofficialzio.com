<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE KICK : Formula Bot & Daily Tips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #1a0000, #000000);
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        .modern-card {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 2rem;
            position: relative;
            overflow: hidden;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: #ff0000;
            outline: none;
        }

        .btn-predict {
            background: linear-gradient(135deg, #ff0000 0%, #990000 100%);
            box-shadow: 0 10px 25px -5px rgba(255, 0, 0, 0.4);
        }

        .btn-telegram {
            background: linear-gradient(135deg, #24A1DE 0%, #1c88bc 100%);
            box-shadow: 0 10px 20px -5px rgba(36, 161, 222, 0.4);
        }

        .nav-btn {
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
            opacity: 0.6;
            font-weight: 800;
        }

        .nav-btn.active {
            color: #ff0000;
            border-bottom: 2px solid #ff0000;
            opacity: 1;
        }

        .tip-card {
            background: #0a0a0a;
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 2rem;
            padding: 2.5rem 1.5rem;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .card-win {
            border: 1px solid rgba(52, 211, 153, 0.5);
            background: linear-gradient(180deg, #0a0a0a 0%, rgba(6, 95, 70, 0.2) 100%);
            box-shadow: 0 10px 40px -10px rgba(6, 95, 70, 0.4);
        }
        .card-win .league-tag { color: #34d399; }
        .card-win .choice-text-label { color: #34d399; }

        .card-loss {
            border: 1px solid rgba(248, 113, 113, 0.4);
            background: linear-gradient(180deg, #0a0a0a 0%, rgba(127, 29, 29, 0.2) 100%);
            box-shadow: 0 10px 40px -10px rgba(127, 29, 29, 0.3);
        }
        .card-loss .league-tag { color: #f87171; }
        .card-loss .choice-text-label { color: #f87171; }

        .league-tag {
            color: #ff0000;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .match-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        .choice-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 1.25rem;
            margin-top: 1rem;
        }

        .choice-text-label {
            color: #ff0000;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .choice-text-value {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .status-badge {
            font-size: 0.65rem;
            padding: 4px 12px;
            border-radius: 99px;
            text-transform: uppercase;
            font-weight: 900;
            margin-top: 15px;
            display: inline-block;
        }

        .status-win { background: #065f46; color: #34d399; }
        .status-loss { background: #7f1d1d; color: #f87171; }
        .status-draw { background: #374151; color: #d1d5db; }
        .status-pending { background: #1e1b4b; color: #818cf8; }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="p-4 sm:p-6">

    <div class="max-w-lg mx-auto w-full pt-6">
        <!-- Navigation -->
        <nav class="flex justify-center space-x-10 mb-8">
            <button id="navBot" onclick="switchPage('bot')" class="nav-btn active text-xs uppercase tracking-widest">Formula Bot</button>
            <button id="navTips" onclick="switchPage('tips')" class="nav-btn text-xs uppercase tracking-widest">Daily Tips</button>
        </nav>

        <!-- Prediction Bot Page -->
        <div id="botPage" class="modern-card p-8 sm:p-10 shadow-2xl">
            <header class="text-center mb-10">
                <div class="inline-block p-1 px-3 rounded-full bg-red-600/10 border border-red-600/20 text-red-500 text-[10px] uppercase tracking-[0.2em] font-bold mb-3">
                    Professional Prediction Engine
                </div>
                <h1 class="text-3xl sm:text-4xl font-extrabold text-white tracking-tighter mb-2">
                    ONE KICK <span class="text-red-600">.</span>
                </h1>
                <p class="text-gray-400 text-sm font-medium">Formula-Based Betting Analysis</p>
            </header>

            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="homeTeam" placeholder="Home Team" class="input-field w-full p-4 rounded-2xl">
                    <input type="text" id="awayTeam" placeholder="Away Team" class="input-field w-full p-4 rounded-2xl">
                </div>

                <div class="input-group">
                    <select id="favTeamSelect" class="input-field w-full p-4 rounded-2xl appearance-none cursor-pointer">
                        <option value="home">Home Team (အပေါ်သင်း)</option>
                        <option value="away">Away Team (အောက်သင်း)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="hdpInput" list="hdpOptions" placeholder="Handicap" class="input-field w-full p-4 rounded-2xl uppercase font-semibold">
                    <input type="text" id="totalInput" list="totalOptions" placeholder="Goal Total" class="input-field w-full p-4 rounded-2xl uppercase font-semibold">
                </div>

                <button onclick="calculatePrediction()" class="btn-predict w-full text-white font-bold py-5 rounded-2xl transition-all duration-300 uppercase tracking-[0.2em] text-sm mt-4">
                    Generate Prediction
                </button>

                <a href="https://t.me/onekick_ofc" target="_blank" class="btn-telegram w-full flex items-center justify-center font-bold py-4 rounded-2xl transition-all duration-300 uppercase tracking-widest text-xs mt-2">
                    Join Telegram
                </a>

                <div id="resultArea" class="hidden mt-8 p-6 bg-red-600/10 border-l-4 border-red-600 rounded-2xl text-center">
                    <div id="selectionText" class="text-xl font-bold text-white"></div>
                </div>
            </div>
        </div>

        <!-- Daily Tips Page -->
        <div id="tipsPage" class="hidden space-y-6">
            <div class="flex justify-center mb-6 bg-white/5 rounded-2xl p-1">
                <button id="tabCurrent" onclick="switchTipView('current')" class="flex-1 py-3 text-[10px] uppercase font-black tracking-widest rounded-xl bg-red-600 text-white transition-all">Current Tips</button>
                <button id="tabHistory" onclick="switchTipView('history')" class="flex-1 py-3 text-[10px] uppercase font-black tracking-widest rounded-xl text-gray-500 transition-all">Result History</button>
            </div>

            <!-- Admin Control Panel -->
            <div id="adminPanel" class="hidden p-6 modern-card border-red-600/30 space-y-3 mb-6">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-red-500">Admin Panel</h3>
                    <button onclick="window.logoutAdmin()" class="text-[10px] text-gray-500 hover:text-white uppercase font-bold">Logout</button>
                </div>
                <input type="text" id="tipLeague" placeholder="League (e.g., PORTUGAL LIGA 1)" class="input-field w-full p-3 rounded-xl text-xs uppercase tracking-wider">
                <input type="text" id="tipMatch" placeholder="Match (e.g., Sporting vs Famalicao)" class="input-field w-full p-3 rounded-xl text-xs">
                <input type="text" id="tipPick" placeholder="Pick (e.g., Sporting ဘော်ဒီ)" class="input-field w-full p-3 rounded-xl text-xs">
                <button onclick="window.addTip()" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-widest">Add New Tip</button>
            </div>

            <div id="tipsContainer" class="space-y-6">
                <div id="loader" class="text-center py-10 text-gray-700 text-xs uppercase tracking-widest animate-pulse">Syncing with Server...</div>
            </div>

            <div class="mt-10 text-center">
                <button id="adminLoginBtn" onclick="window.showLoginModal()" class="text-[10px] text-gray-800 hover:text-red-500 font-bold uppercase tracking-widest transition-colors">Staff Login</button>
            </div>
        </div>

        <footer class="mt-12 text-center">
            <p class="text-[10px] text-gray-600 font-bold uppercase tracking-[0.3em]">One Kick Official Bot v2.7.0</p>
        </footer>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 modal-overlay">
        <div class="modern-card w-full max-w-sm p-8 border-red-600/50 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-center tracking-tight text-white uppercase">Admin Access</h2>
            <input type="password" id="adminPassword" placeholder="Password" class="input-field w-full p-4 rounded-xl text-center font-bold mb-4 tracking-widest">
            <div class="flex space-x-3">
                <button onclick="window.hideLoginModal()" class="flex-1 bg-white/5 text-gray-400 font-bold py-3 rounded-xl text-xs uppercase tracking-widest">Cancel</button>
                <button onclick="window.handleLogin()" class="flex-1 bg-red-600 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-widest">Login</button>
            </div>
        </div>
    </div>

    <!-- Result Update Modal -->
    <div id="resultModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 modal-overlay">
        <div class="modern-card w-full max-w-sm p-8 border-blue-600/50">
            <h2 class="text-xl font-black mb-6 text-center tracking-tight text-white uppercase">Set Match Result</h2>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="window.updateMatchResult('win')" class="bg-green-600 text-white font-bold py-4 rounded-xl text-xs uppercase tracking-widest">WIN</button>
                <button onclick="window.updateMatchResult('loss')" class="bg-red-600 text-white font-bold py-4 rounded-xl text-xs uppercase tracking-widest">LOSS</button>
                <button onclick="window.updateMatchResult('draw')" class="bg-gray-600 text-white font-bold py-4 rounded-xl text-xs uppercase tracking-widest">DRAW</button>
                <button onclick="window.updateMatchResult('pending')" class="bg-indigo-900 text-white font-bold py-4 rounded-xl text-xs uppercase tracking-widest">PENDING</button>
                <button onclick="window.closeResultModal()" class="mt-4 text-gray-500 text-[10px] font-bold uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <datalist id="hdpOptions">
        <option value="-10"><option value="-15"><option value="-20"><option value="-25"><option value="-30"><option value="-35"><option value="-40">
    </datalist>
    <datalist id="totalOptions">
        <option value="2-80"><option value="2-90"><option value="3+20"><option value="3+30"><option value="3+40">
    </datalist>

    <script type="module">
        // Firebase 12.10.0 Imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, serverTimestamp, disableNetwork, enableNetwork } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        // Provided Config
        const firebaseConfig = {
            apiKey: "AIzaSyBcetLiZbDLV3DilnQxqCpYQy0L22P-2GA",
            authDomain: "one-kick-official-2.firebaseapp.com",
            projectId: "one-kick-official-2",
            storageBucket: "one-kick-official-2.firebasestorage.app",
            messagingSenderId: "852449306479",
            appId: "1:852449306479:web:98710d8143488d1014ea9a",
            measurementId: "G-XJ0GSN4W2G"
        };
        const appId = "one-kick-official-2";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // Path Rule 1
        const tipsCollection = collection(db, 'artifacts', appId, 'public', 'data', 'daily_tips');

        let isAdmin = localStorage.getItem('onekick_admin') === 'true'; 
        let activeTipView = 'current'; 
        let selectedMatchId = null;
        let unsubscribeTips = null;

        async function startApp() {
            updateAdminUI();
            
            // Rule 3: Auth first
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    console.log("Logged in:", user.uid);
                    setupTipsListener();
                } else {
                    signInAnonymously(auth).catch(e => console.error("Auth Fail", e));
                }
            });
        }

        function updateAdminUI() {
            const panel = document.getElementById('adminPanel');
            const loginBtn = document.getElementById('adminLoginBtn');
            if (isAdmin) {
                panel?.classList.remove('hidden');
                loginBtn?.classList.add('hidden');
            } else {
                panel?.classList.add('hidden');
                loginBtn?.classList.remove('hidden');
            }
        }

        function setupTipsListener() {
            if (unsubscribeTips) unsubscribeTips();

            const loader = document.getElementById('loader');
            if (loader) {
                loader.classList.remove('hidden');
                loader.innerText = "Connecting to Live Server...";
            }

            // Simple Collection Query (Rule 2)
            unsubscribeTips = onSnapshot(tipsCollection, { includeMetadataChanges: false }, (snapshot) => {
                const container = document.getElementById('tipsContainer');
                if (!container) return;
                if (loader) loader.classList.add('hidden');

                let allTips = [];
                snapshot.forEach(doc => {
                    allTips.push({ id: doc.id, ...doc.data() });
                });

                // Filter & Sort in JS (Rule 2)
                let filteredTips = allTips.filter(t => {
                    const isPending = !t.result || t.result === 'pending';
                    return activeTipView === 'current' ? isPending : !isPending;
                });

                filteredTips.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                renderTips(filteredTips);

            }, (error) => {
                console.error("Live Sync Error:", error.message);
                if (loader) loader.innerHTML = `<span class="text-red-500">Online Access Error.</span>`;
            });
        }

        function renderTips(tips) {
            const container = document.getElementById('tipsContainer');
            if (!container) return;
            container.innerHTML = '';

            if (tips.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-800 text-[10px] uppercase font-bold tracking-widest border border-red-900/20 rounded-3xl">No ${activeTipView} tips found.</div>`;
                return;
            }

            tips.forEach(tip => {
                const statusClass = tip.result ? `status-${tip.result}` : 'status-pending';
                const themeClass = tip.result === 'win' ? 'card-win' : (tip.result === 'loss' ? 'card-loss' : '');
                
                const card = document.createElement('div');
                card.className = `tip-card ${themeClass} shadow-2xl mb-6`;
                card.innerHTML = `
                    <div class="league-tag">${tip.league || 'FOOTBALL'}</div>
                    <div class="match-title">${tip.match}</div>
                    <div class="choice-box">
                        <span class="choice-text-label">Choice : </span>
                        <span class="choice-text-value">${tip.pick}</span>
                    </div>
                    <div class="status-badge ${statusClass}">${tip.result || 'pending'}</div>
                    
                    ${isAdmin ? `
                    <div class="absolute top-4 right-4 flex space-x-2">
                        <button onclick="window.openResultModal('${tip.id}')" class="bg-blue-600/30 text-blue-400 p-2 px-3 rounded-lg font-bold text-[8px]">EDIT</button>
                        <button onclick="window.deleteTip('${tip.id}')" class="bg-red-600/30 text-red-500 p-2 px-3 rounded-lg font-bold text-[8px]">DEL</button>
                    </div>` : ''}
                `;
                container.appendChild(card);
            });
        }

        window.handleLogin = () => {
            if (document.getElementById('adminPassword').value === "admin123") {
                isAdmin = true;
                localStorage.setItem('onekick_admin', 'true');
                updateAdminUI();
                window.hideLoginModal();
                setupTipsListener();
            } else { alert("Access Denied"); }
        };

        window.logoutAdmin = () => {
            isAdmin = false;
            localStorage.setItem('onekick_admin', 'false');
            updateAdminUI();
            setupTipsListener();
        };

        window.addTip = async () => {
            if (!isAdmin || !auth.currentUser) return;
            const league = document.getElementById('tipLeague').value.trim();
            const match = document.getElementById('tipMatch').value.trim();
            const pick = document.getElementById('tipPick').value.trim();
            if (!match || !pick) return;

            try {
                await addDoc(tipsCollection, { 
                    league: league.toUpperCase() || "FOOTBALL", 
                    match, pick, result: 'pending',
                    createdAt: serverTimestamp() 
                });
                document.getElementById('tipLeague').value = '';
                document.getElementById('tipMatch').value = '';
                document.getElementById('tipPick').value = '';
            } catch (e) { console.error("Add Fail", e); }
        };

        window.updateMatchResult = async (status) => {
            if (!selectedMatchId || !isAdmin) return;
            try {
                const matchDoc = doc(db, 'artifacts', appId, 'public', 'data', 'daily_tips', selectedMatchId);
                await updateDoc(matchDoc, { result: status });
                window.closeResultModal();
            } catch (e) { console.error("Update Fail", e); }
        };

        window.deleteTip = async (id) => {
            if (isAdmin && confirm("Confirm Delete?")) {
                try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'daily_tips', id)); }
                catch (e) { console.error("Del Fail", e); }
            }
        };

        window.switchTipView = (view) => {
            activeTipView = view;
            const tabCurrent = document.getElementById('tabCurrent');
            const tabHistory = document.getElementById('tabHistory');
            const activeStyle = 'flex-1 py-3 text-[10px] uppercase font-black tracking-widest rounded-xl bg-red-600 text-white transition-all';
            const inactiveStyle = 'flex-1 py-3 text-[10px] uppercase font-black tracking-widest rounded-xl text-gray-500 transition-all';
            if (tabCurrent) tabCurrent.className = (view === 'current') ? activeStyle : inactiveStyle;
            if (tabHistory) tabHistory.className = (view === 'history') ? activeStyle : inactiveStyle;
            setupTipsListener();
        };

        window.openResultModal = (id) => { selectedMatchId = id; document.getElementById('resultModal').classList.remove('hidden'); };
        window.closeResultModal = () => { selectedMatchId = null; document.getElementById('resultModal').classList.add('hidden'); };
        window.showLoginModal = () => document.getElementById('loginModal').classList.remove('hidden');
        window.hideLoginModal = () => document.getElementById('loginModal').classList.add('hidden');
        
        window.switchPage = (page) => {
            document.getElementById('botPage').classList.toggle('hidden', page !== 'bot');
            document.getElementById('tipsPage').classList.toggle('hidden', page !== 'tips');
            document.getElementById('navBot').classList.toggle('active', page === 'bot');
            document.getElementById('navTips').classList.toggle('active', page === 'tips');
            if (page === 'tips') setupTipsListener();
        };

        window.calculatePrediction = () => {
            const hdp = document.getElementById('hdpInput').value.trim();
            const total = document.getElementById('totalInput').value.trim();
            let selection = "Formula Error: Data not found.";
            if (hdp === "-10" && total === "3+20") selection = "Over (ဂိုးပေါ်)";
            if (hdp === "-20" && total === "2-80") selection = "Over (ဂိုးပေါ်)";
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('selectionText').innerHTML = `Selection: <span class="text-red-500">${selection}</span>`;
        };

        window.onload = startApp;
    </script>
</body>
</html>
